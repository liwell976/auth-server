name: CI - Build, Test, SonarCloud and Docker

on:
  push:
    branches: [ "main", "tp5-change-password" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installation du JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 3. Master Key fictive pour les tests
      - name: Set test Master Key
        run: echo "APP_MASTER_KEY=test_master_key_for_ci_only_32chars" >> $GITHUB_ENV

      # 4. Rendre mvnw exécutable
      - name: Make mvnw executable
        run: chmod +x ./mvnw

      # 5. Build + Tests
      - name: Build and run tests
        run: ./mvnw clean verify

      # 6. Analyse SonarCloud
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw sonar:sonar
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.scanner.javaOpts=-Xmx512m

      # 7. Build image Docker
      - name: Build Docker image
        run: docker build -t cdwfs-auth-app .